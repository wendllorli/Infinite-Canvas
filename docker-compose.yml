services:
  canvas:
    image: ghcr.io/basketikun/infinite-canvas:latest
    expose:
      - "3000"
    restart: unless-stopped

  duomi-adapter:
    build:
      context: ./duomi-adapter
    env_file:
      - .env
    expose:
      - "8787"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - canvas
      - duomi-adapter
    restart: unless-stopped
